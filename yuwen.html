<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>语文练习题 🌈</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --c1: #FF6B6B; --c2: #FFD93D; --c3: #6BCB77; --c4: #4D96FF;
    --c5: #FF922B; --c6: #CC5DE8; --c7: #20C997; --c8: #F06595;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: linear-gradient(135deg, #fff9f0 0%, #fff0f6 50%, #f0f9ff 100%);
    min-height: 100vh;
    padding: 10px;
  }

  body::before {
    content: '';
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background:
      radial-gradient(circle at 10% 15%, rgba(255,107,107,.12) 0%, transparent 35%),
      radial-gradient(circle at 90% 10%, rgba(77,150,255,.12) 0%, transparent 35%),
      radial-gradient(circle at 80% 85%, rgba(107,203,119,.12) 0%, transparent 35%),
      radial-gradient(circle at 15% 80%, rgba(255,217,61,.15) 0%, transparent 35%);
  }

  .page {
    position: relative; z-index: 1;
    max-width: 740px;
    margin: 0 auto;
    background: white;
    border-radius: 24px;
    padding: 28px 32px 24px;
    box-shadow:
      0 0 0 6px #fff,
      0 0 0 10px var(--c4),
      0 8px 40px rgba(0,0,0,.10);
  }

  .header {
    text-align: center;
    margin-bottom: 18px;
    position: relative;
  }

  .stars-row {
    font-size: 22px;
    letter-spacing: 4px;
    margin-bottom: 4px;
    animation: twinkle 2s infinite alternate;
  }
  @keyframes twinkle { from{opacity:.7} to{opacity:1} }

  .title {
    font-family: 'Fredoka One', cursive;
    font-size: 32px;
    background: linear-gradient(90deg, var(--c1), var(--c5), var(--c2), var(--c3), var(--c4), var(--c6));
    background-size: 200%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: rainbow 4s linear infinite;
    line-height: 1.2;
  }
  @keyframes rainbow { 0%{background-position:0%} 100%{background-position:200%} }

  .subtitle-row {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 12px;
    margin-top: 8px;
  }

  .subtitle {
    font-size: 13px;
    color: #888;
    font-weight: 700;
    letter-spacing: 1px;
  }

  .config-btn {
    width: 32px;
    height: 32px;
    border: none;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--c4), var(--c6));
    color: white;
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform .2s, box-shadow .2s;
  }
  .config-btn:hover {
    transform: scale(1.1);
    box-shadow: 0 4px 12px rgba(77,150,255,.4);
  }

  .info-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin: 10px 0 18px;
    gap: 10px;
  }

  .info-box {
    flex: 1;
    border-radius: 12px;
    padding: 8px 14px;
    font-size: 13px;
    font-weight: 700;
    color: white;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .info-box.name  { background: linear-gradient(135deg, var(--c1), var(--c5)); }
  .info-box.date  { background: linear-gradient(135deg, var(--c4), var(--c6)); }
  .info-box.score { background: linear-gradient(135deg, var(--c3), var(--c7)); }

  .info-box span { font-size: 16px; }

  .info-line {
    flex: 1;
    border-bottom: 2px dotted rgba(255,255,255,.7);
    min-width: 60px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px 12px;
  }

  .card {
    border-radius: 16px;
    padding: 12px 10px 10px;
    text-align: center;
    position: relative;
    overflow: hidden;
    border: 3px solid transparent;
    transition: transform .2s, box-shadow .2s;
    cursor: pointer;
  }
  .card:hover { 
    transform: scale(1.04);
    box-shadow: 0 6px 16px rgba(0,0,0,.1);
  }
  .card.active {
    box-shadow: 0 0 0 3px var(--c4), 0 6px 20px rgba(77,150,255,.3);
    transform: scale(1.02);
  }

  .card:nth-child(8n+1)  { background: #FFF3F3; border-color: var(--c1); }
  .card:nth-child(8n+2)  { background: #FFFBEA; border-color: var(--c2); }
  .card:nth-child(8n+3)  { background: #F3FFF5; border-color: var(--c3); }
  .card:nth-child(8n+4)  { background: #F0F5FF; border-color: var(--c4); }
  .card:nth-child(8n+5)  { background: #FFF5EE; border-color: var(--c5); }
  .card:nth-child(8n+6)  { background: #FCF0FF; border-color: var(--c6); }
  .card:nth-child(8n+7)  { background: #EDFFF8; border-color: var(--c7); }
  .card:nth-child(8n+0)  { background: #FFF0F5; border-color: var(--c8); }

  .num-badge {
    position: absolute; top: 6px; left: 8px;
    font-size: 10px; font-weight: 900;
    color: white;
    width: 18px; height: 18px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  }
  .card:nth-child(8n+1) .num-badge { background: var(--c1); }
  .card:nth-child(8n+2) .num-badge { background: var(--c2); color:#333; }
  .card:nth-child(8n+3) .num-badge { background: var(--c3); }
  .card:nth-child(8n+4) .num-badge { background: var(--c4); }
  .card:nth-child(8n+5) .num-badge { background: var(--c5); }
  .card:nth-child(8n+6) .num-badge { background: var(--c6); }
  .card:nth-child(8n+7) .num-badge { background: var(--c7); }
  .card:nth-child(8n+0) .num-badge { background: var(--c8); }

  .pinyin {
    font-size: 24px;
    font-weight: 800;
    margin-bottom: 8px;
    color: #333;
  }

  .hint {
    font-size: 12px;
    color: #666;
    margin-bottom: 8px;
  }

  .image-icon {
    font-size: 44px;
    margin: 0 auto 10px;
    line-height: 1;
  }

  .example {
    font-size: 14px;
    color: #555;
    margin-top: 4px;
  }

  .footer {
    text-align: center;
    margin-top: 16px;
    font-size: 18px;
    letter-spacing: 6px;
  }

  .footer-msg {
    font-family: 'Fredoka One', cursive;
    font-size: 14px;
    margin-top: 6px;
    background: linear-gradient(90deg, var(--c1), var(--c4), var(--c3));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.35);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 12px;
    z-index: 100;
  }

  .modal.open { display: flex; }

  .modal-content {
    width: min(520px, 100%);
    background: white;
    border-radius: 22px;
    box-shadow: 0 20px 60px rgba(0,0,0,.18);
    overflow: hidden;
  }

  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 18px 22px;
    font-size: 18px;
    font-weight: 800;
    border-bottom: 1px solid #f0f0f0;
  }

  .close-btn {
    border: none;
    background: transparent;
    font-size: 22px;
    cursor: pointer;
    color: #666;
  }

  .modal-body {
    display: grid;
    gap: 14px;
    padding: 20px 22px;
  }

  .field {
    display: grid;
    gap: 6px;
    font-size: 14px;
  }

  .field label {
    font-weight: 700;
  }

  .field select {
    width: 100%;
    border-radius: 999px;
    border: 1px solid #ddd;
    padding: 10px 14px;
    font-size: 14px;
    outline: none;
  }

  .modal-actions {
    display: flex;
    justify-content: flex-end;
    gap: 12px;
    padding: 16px 22px 22px;
    background: #f9fbff;
  }

  .modal-actions button {
    border: none;
    border-radius: 999px;
    padding: 10px 18px;
    font-size: 14px;
    font-weight: 800;
    cursor: pointer;
  }

  #cancelConfig {
    background: #f0f0f5;
    color: #575767;
  }

  #applyConfig {
    background: linear-gradient(135deg, var(--c3), var(--c7));
    color: white;
  }

  .speak-hint {
    font-size: 12px;
    color: var(--c4);
    margin-top: 8px;
    font-weight: 600;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
  }

  @media print {
    body { background: white; padding: 0; }
    body::before { display: none; }
    .page {
      box-shadow: none;
      border-radius: 0;
      max-width: 100%;
      padding: 18px 20px;
    }
    .card:hover { transform: none; }
    .title { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .card  { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .info-box { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .num-badge { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .config-btn, .modal { display: none; }
    @page { size: A4; margin: 10mm 12mm; }
  }
</style>
</head>
<body>
<div class="page">

  <div class="header">
    <div class="stars-row">🌟📚🎈🍎✨🧠📝🎉</div>
    <div class="title">拼音启蒙：a o e i u</div>
    <div class="subtitle-row">
      <div class="subtitle" id="subtitle">从 a o e i u 开始学习，每张卡片都有图像和文字</div>
      <button class="config-btn" id="openConfig" aria-label="配置">⚙️</button>
    </div>
    <div class="speak-hint">👆 点击卡片听发音</div>
  </div>

  <div class="info-row">
    <div class="info-box name">
      <span>😊</span> 姓名：<div class="info-line"></div>
    </div>
    <div class="info-box date">
      <span>📅</span> 日期：<div class="info-line"></div>
    </div>
    <div class="info-box score">
      <span>🏅</span> 得分：<div class="info-line"></div>
    </div>
  </div>

  <div class="grid" id="grid"></div>

  <div class="footer">拼音好帮手</div>
  <div class="footer-msg">认真练习，声音会更响亮！🎤✨</div>
</div>

<div id="configModal" class="modal" aria-hidden="true">
  <div class="modal-content">
    <div class="modal-header">
      <div>练习配置</div>
      <button class="close-btn" id="closeConfig">×</button>
    </div>
    <div class="modal-body">
      <div class="field">
        <label>选择学习内容</label>
        <select id="modeSelect">
          <option value="basic">基础韵母：a o e i u ü</option>
          <option value="shengmu">声母：b p m f d t n l</option>
          <option value="yunmu">复韵母：ai ei ui ao ou iu</option>
          <option value="advanced">整体认读音节：zhi chi shi ri</option>
          <option value="full">全部内容</option>
        </select>
      </div>
      <div class="field">
        <label for="countSelect">卡片数量</label>
        <select id="countSelect">
          <option value="5">5 张</option>
          <option value="10">10 张</option>
          <option value="16">16 张</option>
          <option value="20">20 张</option>
          <option value="24">24 张</option>
        </select>
      </div>
    </div>
    <div class="modal-actions">
      <button id="cancelConfig">取消</button>
      <button id="applyConfig">应用</button>
    </div>
  </div>
</div>

<script>
const pinyinData = {
  basic: [
    { sound: 'a', image: '🍎', label: 'a（啊）', example: '阿姨' },
    { sound: 'o', image: '🍊', label: 'o（喔）', example: '欧阳' },
    { sound: 'e', image: '🐘', label: 'e（鹅）', example: '饿了' },
    { sound: 'i', image: '🍦', label: 'i（衣）', example: '衣服' },
    { sound: 'u', image: '🐢', label: 'u（乌）', example: '乌鸦' },
    { sound: 'ü', image: '🐟', label: 'ü（鱼）', example: '鲤鱼' }
  ],
  shengmu: [
    { sound: 'b', label: 'b（波）', example: '爸爸' },
    { sound: 'p', label: 'p（坡）', example: '皮球' },
    { sound: 'm', label: 'm（摸）', example: '妈妈' },
    { sound: 'f', label: 'f（佛）', example: '发光' },
    { sound: 'd', label: 'd（得）', example: '点心' },
    { sound: 't', label: 't（特）', example: '兔子' },
    { sound: 'n', label: 'n（呢）', example: '奶奶' },
    { sound: 'l', label: 'l（了）', example: '蓝蓝' },
    { sound: 'g', label: 'g（哥）', example: '哥哥' },
    { sound: 'k', label: 'k（科）', example: '口袋' },
    { sound: 'h', label: 'h（喝）', example: '好好' },
    { sound: 'j', label: 'j（鸡）', example: '姐姐' },
    { sound: 'q', label: 'q（七）', example: '气球' },
    { sound: 'x', label: 'x（西）', example: '西瓜' },
    { sound: 'zh', label: 'zh（知）', example: '知识' },
    { sound: 'ch', label: 'ch（吃）', example: '吃饭' },
    { sound: 'sh', label: 'sh（诗）', example: '诗歌' },
    { sound: 'r', label: 'r（日）', example: '日子' },
    { sound: 'z', label: 'z（资）', example: '字母' },
    { sound: 'c', label: 'c（次）', example: '次第' },
    { sound: 's', label: 's（思）', example: '四季' }
  ],
  yunmu: [
    { sound: 'ai', label: 'ai（爱）', example: '爱心' },
    { sound: 'ei', label: 'ei（诶）', example: '诶呀' },
    { sound: 'ui', label: 'ui（威）', example: '威风' },
    { sound: 'ao', label: 'ao（奥）', example: '奥运' },
    { sound: 'ou', label: 'ou（欧）', example: '欧洲' },
    { sound: 'iu', label: 'iu（优）', example: '优秀' },
    { sound: 'ie', label: 'ie（耶）', example: '爷爷' },
    { sound: 'üe', label: 'üe（约）', example: '月亮' },
    { sound: 'er', label: 'er（儿）', example: '儿子' },
    { sound: 'an', label: 'an（安）', example: '安全' },
    { sound: 'en', label: 'en（恩）', example: '恩情' },
    { sound: 'in', label: 'in（因）', example: '因为' },
    { sound: 'un', label: 'un（温）', example: '温暖' },
    { sound: 'ün', label: 'ün（晕）', example: '晕车' },
    { sound: 'ang', label: 'ang（昂）', example: '昂首' },
    { sound: 'eng', label: 'eng（亨）', example: '哼歌' },
    { sound: 'ing', label: 'ing（英）', example: '英雄' },
    { sound: 'ong', label: 'ong（轰）', example: '轰炸' }
  ],
  advanced: [
    { sound: 'zhi', label: 'zhi', example: '知识' },
    { sound: 'chi', label: 'chi', example: '吃饭' },
    { sound: 'shi', label: 'shi', example: '诗歌' },
    { sound: 'ri', label: 'ri', example: '日子' },
    { sound: 'zi', label: 'zi', example: '字母' },
    { sound: 'ci', label: 'ci', example: '次第' },
    { sound: 'si', label: 'si', example: '四季' },
    { sound: 'yi', label: 'yi', example: '衣服' },
    { sound: 'wu', label: 'wu', example: '乌鸦' },
    { sound: 'yu', label: 'yu', example: '鱼儿' },
    { sound: 'ye', label: 'ye', example: '爷爷' },
    { sound: 'yue', label: 'yue', example: '月亮' },
    { sound: 'yuan', label: 'yuan', example: '花园' },
    { sound: 'yin', label: 'yin', example: '音乐' },
    { sound: 'yun', label: 'yun', example: '云朵' },
    { sound: 'ying', label: 'ying', example: '英雄' }
  ],
  full: []
};

pinyinData.full = pinyinData.basic.concat(pinyinData.shengmu, pinyinData.yunmu, pinyinData.advanced);

const config = {
  mode: 'basic',
  count: 5
};

const grid = document.getElementById('grid');
const subtitle = document.getElementById('subtitle');
const modal = document.getElementById('configModal');
const openConfig = document.getElementById('openConfig');
const closeConfig = document.getElementById('closeConfig');
const cancelConfig = document.getElementById('cancelConfig');
const applyConfig = document.getElementById('applyConfig');
const modeSelect = document.getElementById('modeSelect');
const countSelect = document.getElementById('countSelect');

function shuffle(array) {
  return array.slice().sort(() => Math.random() - 0.5);
}

function speak(text) {
  if ('speechSynthesis' in window) {
    window.speechSynthesis.cancel();
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = 'zh-CN';
    utterance.rate = 0.8;
    utterance.pitch = 1;
    window.speechSynthesis.speak(utterance);
  }
}

function createGrid() {
  const pool = shuffle(pinyinData[config.mode] || pinyinData.basic);
  grid.innerHTML = '';
  const items = Array.from({ length: config.count }, (_, i) => pool[i % pool.length]);

  items.forEach((item, index) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.sound = item.sound;
    card.innerHTML = `
      <div class="num-badge">${index + 1}</div>
      <div class="image-icon">${item.image || '🔤'}</div>
      <div class="pinyin">${item.sound}</div>
      <div class="hint">${item.label}</div>
      <div class="example">例：${item.example}</div>
    `;
    
    card.addEventListener('click', () => {
      card.classList.add('active');
      speak(item.sound);
      setTimeout(() => card.classList.remove('active'), 500);
    });
    
    grid.appendChild(card);
  });
}

function updateSubtitle() {
  const modeName = {
    basic: '基础韵母',
    shengmu: '声母',
    yunmu: '复韵母',
    advanced: '整体认读音节',
    full: '全部拼音'
  }[config.mode];
  subtitle.textContent = `拼音识读 · ${modeName} · 共${config.count} 张卡片`;
}

function syncConfigUI() {
  modeSelect.value = config.mode;
  countSelect.value = String(config.count);
}

function openModal() {
  syncConfigUI();
  modal.classList.add('open');
  modal.setAttribute('aria-hidden', 'false');
}

function closeModal() {
  modal.classList.remove('open');
  modal.setAttribute('aria-hidden', 'true');
}

function applySettings() {
  config.mode = modeSelect.value;
  config.count = Number(countSelect.value);
  updateSubtitle();
  createGrid();
  closeModal();
}

openConfig.addEventListener('click', openModal);
closeConfig.addEventListener('click', closeModal);
cancelConfig.addEventListener('click', closeModal);
modal.addEventListener('click', (event) => {
  if (event.target === modal) closeModal();
});
applyConfig.addEventListener('click', applySettings);

updateSubtitle();
createGrid();
</script>
</body>
</html>
