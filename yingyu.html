<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>英语单词小课堂 🌈</title>

<style>
  :root {
    --c1: #FF6B6B; --c2: #FFD93D; --c3: #6BCB77; --c4: #4D96FF;

  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: linear-gradient(135deg, #fff9f0 0%, #fff0f6 50%, #f0f9ff 100%);
    min-height: 100vh;
    padding: 10px;
  }

  body::before {
    content: '';
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background:
      radial-gradient(circle at 10% 15%, rgba(255,107,107,.12) 0%, transparent 35%),
      radial-gradient(circle at 90% 10%, rgba(77,150,255,.12) 0%, transparent 35%),
      radial-gradient(circle at 80% 85%, rgba(107,203,119,.12) 0%, transparent 35%),
      radial-gradient(circle at 15% 80%, rgba(255,217,61,.15) 0%, transparent 35%);
  }

  .page {
    position: relative; z-index: 1;
    max-width: 740px;
    margin: 0 auto;
    background: white;
    border-radius: 24px;
    padding: 28px 32px 24px;
    box-shadow:
      0 0 0 6px #fff,
      0 0 0 10px var(--c4),
      0 8px 40px rgba(0,0,0,.10);
  }

  .header {
    text-align: center;
    margin-bottom: 18px;
    position: relative;
  }

  .stars-row {
    font-size: 22px;
    letter-spacing: 4px;
    margin-bottom: 4px;
    animation: twinkle 2s infinite alternate;
  }
  @keyframes twinkle { from{opacity:.7} to{opacity:1} }

  .title {
    font-family: 'Fredoka One', cursive;
    font-size: 32px;
    background: linear-gradient(90deg, var(--c1), var(--c5), var(--c2), var(--c3), var(--c4), var(--c6));
    background-size: 200%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: rainbow 4s linear infinite;
    line-height: 1.2;
  }
  @keyframes rainbow { 0%{background-position:0%} 100%{background-position:200%} }

  .subtitle-row {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 12px;
    margin-top: 8px;
  }

  .subtitle {
    font-size: 13px;
    color: #888;
    font-weight: 700;
    letter-spacing: 1px;
  }

  .config-btn {
    width: 32px;
    height: 32px;
    border: none;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--c4), var(--c6));
    color: white;
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform .2s, box-shadow .2s;
  }
  .config-btn:hover {
    transform: scale(1.1);
    box-shadow: 0 4px 12px rgba(77,150,255,.4);
  }

  .speak-hint {
    font-size: 12px;
    color: var(--c4);
    margin-top: 8px;
    font-weight: 600;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
  }

  .info-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin: 10px 0 18px;
    gap: 10px;
  }

  .info-box {
    flex: 1;
    border-radius: 12px;
    padding: 8px 14px;
    font-size: 13px;
    font-weight: 700;
    color: white;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .info-box.name  { background: linear-gradient(135deg, var(--c1), var(--c5)); }
  .info-box.date  { background: linear-gradient(135deg, var(--c4), var(--c6)); }
  .info-box.score { background: linear-gradient(135deg, var(--c3), var(--c7)); }

  .info-box span { font-size: 16px; }

  .info-line {
    flex: 1;
    border-bottom: 2px dotted rgba(255,255,255,.7);
    min-width: 60px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px 12px;
  }

  .card {
    border-radius: 16px;
    padding: 12px 10px 10px;
    text-align: center;
    position: relative;
    overflow: hidden;
    border: 3px solid transparent;
    transition: transform .2s, box-shadow .2s;
    cursor: pointer;
  }
  .card:hover { 
    transform: scale(1.04);
    box-shadow: 0 6px 16px rgba(0,0,0,.1);
  }
  .card.active {
    box-shadow: 0 0 0 3px var(--c4), 0 6px 20px rgba(77,150,255,.3);
    transform: scale(1.02);
  }

  .card:nth-child(8n+1)  { background: #FFF3F3; border-color: var(--c1); }
  .card:nth-child(8n+2)  { background: #FFFBEA; border-color: var(--c2); }
  .card:nth-child(8n+3)  { background: #F3FFF5; border-color: var(--c3); }
  .card:nth-child(8n+4)  { background: #F0F5FF; border-color: var(--c4); }
  .card:nth-child(8n+5)  { background: #FFF5EE; border-color: var(--c5); }
  .card:nth-child(8n+6)  { background: #FCF0FF; border-color: var(--c6); }
  .card:nth-child(8n+7)  { background: #EDFFF8; border-color: var(--c7); }
  .card:nth-child(8n+0)  { background: #FFF0F5; border-color: var(--c8); }

  .num-badge {
    position: absolute; top: 6px; left: 8px;
    font-size: 10px; font-weight: 900;
    color: white;
    width: 18px; height: 18px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  }
  .card:nth-child(8n+1) .num-badge { background: var(--c1); }
  .card:nth-child(8n+2) .num-badge { background: var(--c2); color:#333; }
  .card:nth-child(8n+3) .num-badge { background: var(--c3); }
  .card:nth-child(8n+4) .num-badge { background: var(--c4); }
  .card:nth-child(8n+5) .num-badge { background: var(--c5); }
  .card:nth-child(8n+6) .num-badge { background: var(--c6); }
  .card:nth-child(8n+7) .num-badge { background: var(--c7); }
  .card:nth-child(8n+0) .num-badge { background: var(--c8); }

  .word-icon {
    font-size: 32px;
    margin-bottom: 6px;
    line-height: 1;
  }

  .word {
    font-family: 'Fredoka One', cursive;
    font-size: 18px;
    color: #333;
    margin-bottom: 4px;
  }

  .translation {
    font-size: 12px;
    color: #666;
    margin-bottom: 4px;
  }

  .example {
    font-size: 11px;
    color: #888;
    font-style: italic;
  }

  .footer {
    text-align: center;
    margin-top: 16px;
    font-size: 18px;
    letter-spacing: 6px;
  }

  .footer-msg {
    font-family: 'Fredoka One', cursive;
    font-size: 14px;
    margin-top: 6px;
    background: linear-gradient(90deg, var(--c1), var(--c4), var(--c3));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.35);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 12px;
    z-index: 100;
  }

  .modal.open { display: flex; }

  .modal-content {
    width: min(520px, 100%);
    background: white;
    border-radius: 22px;
    box-shadow: 0 20px 60px rgba(0,0,0,.18);
    overflow: hidden;
  }

  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 18px 22px;
    font-size: 18px;
    font-weight: 800;
    border-bottom: 1px solid #f0f0f0;
  }

  .close-btn {
    border: none;
    background: transparent;
    font-size: 22px;
    cursor: pointer;
    color: #666;
  }

  .modal-body {
    display: grid;
    gap: 14px;
    padding: 20px 22px;
  }

  .field {
    display: grid;
    gap: 6px;
    font-size: 14px;
  }

  .field label {
    font-weight: 700;
  }

  .field select {
    width: 100%;
    border-radius: 999px;
    border: 1px solid #ddd;
    padding: 10px 14px;
    font-size: 14px;
    outline: none;
  }

  .modal-actions {
    display: flex;
    justify-content: flex-end;
    gap: 12px;
    padding: 16px 22px 22px;
    background: #f9fbff;
  }

  .modal-actions button {
    border: none;
    border-radius: 999px;
    padding: 10px 18px;
    font-size: 14px;
    font-weight: 800;
    cursor: pointer;
  }

  #cancelConfig {
    background: #f0f0f5;
    color: #575767;
  }

  #applyConfig {
    background: linear-gradient(135deg, var(--c3), var(--c7));
    color: white;
  }

  @media print {
    body { background: white; padding: 0; }
    body::before { display: none; }
    .page {
      box-shadow: none;
      border-radius: 0;
      max-width: 100%;
      padding: 18px 20px;
    }
    .card:hover { transform: none; }
    .title { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .card  { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .info-box { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .num-badge { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .config-btn, .modal { display: none; }
    @page { size: A4; margin: 10mm 12mm; }
  }
</style>
</head>

    </div>
    <div class="modal-actions">
      <button id="cancelConfig">取消</button>
      <button id="applyConfig">应用</button>
    </div>
  </div>
</div>

const config = {
  category: 'fruits',
  count: 16
};

const grid = document.getElementById('grid');
const subtitle = document.getElementById('subtitle');
const modal = document.getElementById('configModal');
const openConfig = document.getElementById('openConfig');
const closeConfig = document.getElementById('closeConfig');
const cancelConfig = document.getElementById('cancelConfig');
const applyConfig = document.getElementById('applyConfig');
const categorySelect = document.getElementById('categorySelect');
const countSelect = document.getElementById('countSelect');

function shuffle(array) {
  return array.slice().sort(() => Math.random() - 0.5);
}

function speak(word) {
  if ('speechSynthesis' in window) {
    window.speechSynthesis.cancel();
    const utterance = new SpeechSynthesisUtterance(word);
    utterance.lang = 'en-US';
    utterance.rate = 0.8;
    utterance.pitch = 1;
    window.speechSynthesis.speak(utterance);
  }
}

function createGrid() {
  let pool;
  
  if (config.category === 'all') {
    pool = [];
    Object.keys(wordData).forEach(key => {
      pool = pool.concat(wordData[key]);
    });
  } else {
    pool = wordData[config.category] || wordData.fruits;
  }
  
  const shuffled = shuffle(pool);
  grid.innerHTML = '';
  const items = Array.from({ length: config.count }, (_, i) => shuffled[i % shuffled.length]);

  items.forEach((item, index) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.word = item.word;
    card.innerHTML = `
      <div class="num-badge">${index + 1}</div>
      <div class="word-icon">${item.icon}</div>
      <div class="word">${item.word}</div>
      <div class="translation">${item.translation}</div>
      <div class="example">${item.example}</div>
    `;
    
    card.addEventListener('click', () => {
      card.classList.add('active');
      speak(item.word);
      setTimeout(() => card.classList.remove('active'), 500);
    });
    
    grid.appendChild(card);
  });
}

function updateSubtitle() {
  const categoryNames = {
    fruits: '水果类',
    animals: '动物类',
    vehicles: '交通工具',
    food: '食物类',
    daily: '生活用品',
    colors: '颜色',
    shapes: '形状',
    weather: '天气',
    school: '学习用品',
    family: '家庭成员',
    all: '全部类别'
  };
  subtitle.textContent = `英语单词 · ${categoryNames[config.category]} · 共${config.count} 个单词`;
}

function syncConfigUI() {
  categorySelect.value = config.category;
  countSelect.value = String(config.count);
}

function openModal() {
  syncConfigUI();
  modal.classList.add('open');
  modal.setAttribute('aria-hidden', 'false');
}

function closeModal() {
  modal.classList.remove('open');
  modal.setAttribute('aria-hidden', 'true');
}

function applySettings() {
  config.category = categorySelect.value;
  config.count = Number(countSelect.value);
  updateSubtitle();
  createGrid();
  closeModal();
}

openConfig.addEventListener('click', openModal);
closeConfig.addEventListener('click', closeModal);
cancelConfig.addEventListener('click', closeModal);
modal.addEventListener('click', (event) => {
  if (event.target === modal) closeModal();
});
applyConfig.addEventListener('click', applySettings);

updateSubtitle();
createGrid();
</script>
